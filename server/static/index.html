<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyChess</title>
  <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, monospace;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 20px 24px 32px;
    }

    /* ── Connection indicator ── */
    #ws-status {
      position: fixed;
      top: 10px;
      right: 14px;
      font-size: 0.75rem;
      color: #e74c3c;
    }
    #ws-status.ok { color: #2ecc71; }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 24px;
    }
    header h1 {
      font-size: 1.9rem;
      color: #f0c040;
      letter-spacing: 2px;
    }
    header p {
      font-size: 0.78rem;
      color: #777;
      margin-top: 4px;
    }

    /* ── Layout ── */
    .layout {
      display: flex;
      gap: 32px;
      justify-content: center;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    /* ── Left column ── */
    .left {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    /* ── Board area: problem panel + board side by side ── */
    .board-area {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 14px;
    }

    /* ── Clocks ── */
    .clocks {
      display: flex;
      gap: 16px;
    }
    .clock {
      padding: 7px 18px;
      border-radius: 8px;
      background: #16213e;
      border: 2px solid #2a3a5e;
      font-size: 1rem;
      transition: border-color 0.3s, color 0.3s;
    }
    .clock.active {
      border-color: #f0c040;
      color: #f0c040;
    }

    /* ── Board ── */
    #board { width: 420px; }

    /* ── Controls ── */
    .controls { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .controls button { width: 140px; }

    button {
      color: #fff;
      border: none;
      padding: 9px 20px;
      border-radius: 7px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }
    button:disabled { background: #3a3a3a !important; cursor: not-allowed; opacity: 0.6; }

    #auto-btn   { background: #2e7d32; }
    #auto-btn:hover:not(:disabled)  { background: #1b5e20; }

    #reset-btn  { background: #1565c0; }
    #reset-btn:hover:not(:disabled) { background: #0d47a1; }

    #quit-btn   { background: #b71c1c; }
    #quit-btn:hover:not(:disabled)  { background: #7f0000; }

    /* ── Status lines ── */
    #turn-info {
      font-size: 1rem;
      font-weight: 600;
    }
    #turn-info.gameover {
      color: #f0c040;
      font-size: 1.05rem;
    }
    #message {
      min-height: 1.3em;
      font-size: 0.88rem;
      color: #aaa;
      text-align: center;
    }
    #message.err { color: #e74c3c; }

    /* ── Right column ── */
    .right {
      display: flex;
      flex-direction: column;
      gap: 20px;
      min-width: 240px;
      max-width: 300px;
    }
    .panel {
      background: #16213e;
      border-radius: 10px;
      padding: 16px;
    }
    .panel h3 {
      color: #f0c040;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 10px;
    }
    #history {
      font-family: monospace;
      font-size: 0.83rem;
      white-space: pre;
      line-height: 1.7;
      color: #ccc;
      max-height: 320px;
      overflow-y: auto;
    }
    #stats {
      font-size: 0.85rem;
      color: #bbb;
      line-height: 1.7;
    }
    #stats pre {
      margin-top: 6px;
      font-size: 0.76rem;
      color: #777;
      white-space: pre-wrap;
    }

    /* ── Problem mode toggle ── */
    .problem-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      user-select: none;
    }
    .problem-toggle input { width: 16px; height: 16px; cursor: pointer; accent-color: #f0c040; }

    /* ── Problem mode panel (left of board, vertical strip) ── */
    #problem-panel {
      display: none;          /* becomes flex when active */
      flex-direction: column;
      gap: 14px;
      background: #16213e;
      border: 1px solid #f0c040;
      border-radius: 10px;
      padding: 14px 12px;
      width: 150px;
      flex-shrink: 0;
    }

    .prob-section {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .prob-section-title {
      color: #f0c040;
      font-size: 0.70rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      border-bottom: 1px solid #2a3a5e;
      padding-bottom: 4px;
    }
    .prob-section label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.86rem;
      cursor: pointer;
    }
    .prob-section input[type="radio"],
    .prob-section input[type="checkbox"] {
      accent-color: #f0c040;
      cursor: pointer;
      flex-shrink: 0;
    }

    #copy-mode-btn {
      background: #444;
      width: 100%;
      padding: 7px 10px;
      font-size: 0.82rem;
      border-radius: 6px;
    }
    #copy-mode-btn:hover:not(:disabled) { background: #555; }
    #copy-mode-btn.active { background: #b36a00; }

    .prob-hint {
      color: #666;
      font-size: 0.72rem;
      line-height: 1.5;
    }

    /* ── Promotion modal ── */
    .promo-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.78);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .promo-box {
      background: #16213e;
      border: 2px solid #f0c040;
      border-radius: 14px;
      padding: 28px 32px 20px;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.8);
    }
    .promo-box h3 {
      color: #f0c040;
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 20px;
    }
    .promo-choices {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }
    .promo-piece {
      background: #0f1a30;
      border: 2px solid #2a3a5e;
      border-radius: 10px;
      padding: 10px 12px 6px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      width: 76px;
      transition: border-color 0.15s, background 0.15s;
    }
    .promo-piece:hover { border-color: #f0c040; background: #1a2a4a; }
    .promo-piece img   { width: 48px; height: 48px; display: block; }
    .promo-piece span  { color: #bbb; font-size: 0.75rem; }
    .promo-cancel {
      background: #3a3a3a;
      width: 100%;
      padding: 8px;
      font-size: 0.88rem;
      border-radius: 7px;
      margin-top: 4px;
    }
    .promo-cancel:hover:not(:disabled) { background: #555; }
  </style>
</head>
<body>

<div id="ws-status">&#x2B24; d&eacute;connect&eacute;</div>

<header>
  <h1>&#x265F; MyChess</h1>
  <p id="version-info">chargement&hellip;</p>
</header>

<div class="layout">

  <!-- ── Left column ── -->
  <div class="left">
    <div class="clocks">
      <div class="clock" id="clock-white">&#x2654; Blancs &nbsp;<span id="white-time">0:00</span></div>
      <div class="clock" id="clock-black">&#x265A; Noirs &nbsp;<span id="black-time">0:00</span></div>
    </div>

    <!-- Problem panel sits LEFT of the board inside this row wrapper -->
    <div class="board-area">

      <!-- Problem mode editor panel (hidden by default) -->
      <div id="problem-panel">
        <div class="prob-section">
          <span class="prob-section-title">Trait</span>
          <label><input type="radio" name="prob-turn" value="w" checked> Blancs</label>
          <label><input type="radio" name="prob-turn" value="b"> Noirs</label>
        </div>

        <div class="prob-section">
          <span class="prob-section-title">Roque</span>
          <label><input type="checkbox" id="castle-wk" checked> &#x2654;&nbsp;Petit</label>
          <label><input type="checkbox" id="castle-wq" checked> &#x2654;&nbsp;Grand</label>
          <label><input type="checkbox" id="castle-bk" checked> &#x265A;&nbsp;Petit</label>
          <label><input type="checkbox" id="castle-bq" checked> &#x265A;&nbsp;Grand</label>
        </div>

        <div class="prob-section">
          <span class="prob-section-title">Edition</span>
          <button id="copy-mode-btn" onclick="toggleCopyMode()">Copie&nbsp;: OFF</button>
          <span class="prob-hint">Drag&nbsp;: d&eacute;placer<br>Copie ON&nbsp;: dupliquer<br>Hors &eacute;ch.&nbsp;: supprimer</span>
        </div>
      </div>

      <div id="board"></div>
    </div>

    <div class="controls">
      <button id="auto-btn"   onclick="sendAuto()"  disabled>Auto</button>
      <button id="reset-btn"  onclick="sendReset()">Nouvelle partie</button>
      <button id="quit-btn"   onclick="sendQuit()">Quitter</button>
    </div>

    <label class="problem-toggle">
      <input type="checkbox" id="problem-check" onchange="onProblemCheck()">
      Mode Probl&egrave;me
    </label>

    <div id="turn-info">Connexion&hellip;</div>
    <div id="message"></div>
  </div>

  <!-- ── Right column ── -->
  <div class="right">
    <div class="panel">
      <h3>Historique</h3>
      <pre id="history">&ndash;</pre>
    </div>
    <div class="panel">
      <h3>Analyse</h3>
      <div id="stats">&ndash;</div>
    </div>
  </div>

</div>

<!-- Promotion modal -->
<div id="promo-modal" class="promo-overlay">
  <div class="promo-box">
    <h3>Promotion &mdash; choisir la pi&egrave;ce</h3>
    <div class="promo-choices">
      <button class="promo-piece" onclick="choosePromo('q')"><img id="pi-q" src="" alt=""><span>Dame</span></button>
      <button class="promo-piece" onclick="choosePromo('r')"><img id="pi-r" src="" alt=""><span>Tour</span></button>
      <button class="promo-piece" onclick="choosePromo('b')"><img id="pi-b" src="" alt=""><span>Fou</span></button>
      <button class="promo-piece" onclick="choosePromo('n')"><img id="pi-n" src="" alt=""><span>Cavalier</span></button>
    </div>
    <button class="promo-cancel" onclick="cancelPromo()">Annuler</button>
  </div>
</div>

<!-- Dependencies from CDN (full jQuery required by chessboard.js for animations) -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

<script>
'use strict';

var ws = null;
var dragging = false;
var pendingPromo = null;   // { source, target } while promo modal is open
var lastFen = 'start';     // last FEN received from server
var quitting = false;      // set to true after Quitter confirmed
var problemMode = false;   // true when server is in problem-editing mode
var copyMode = false;      // true when copy-mode button is active
var copyPending = null;    // { sq, piece } to restore after snap, in copy mode

// ── Piece images ──────────────────────────────────────────────────────────────

var PIECE_SYMS = {
  wK:'♔', wQ:'♕', wR:'♖', wB:'♗', wN:'♘', wP:'♙',
  bK:'♚', bQ:'♛', bR:'♜', bB:'♝', bN:'♞', bP:'♟'
};

var PIECE_IMGS = (function () {
  var out = {};
  for (var code in PIECE_SYMS) {
    var sym = PIECE_SYMS[code];
    var c = document.createElement('canvas');
    c.width = c.height = 64;
    var ctx = c.getContext('2d');
    ctx.font = '52px "Segoe UI Symbol", "Apple Symbols", serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    if (code[0] === 'w') {
      ctx.strokeStyle = '#444';
      ctx.lineWidth = 3;
      ctx.strokeText(sym, 32, 34);
      ctx.fillStyle = '#fff';
    } else {
      ctx.strokeStyle = '#bbb';
      ctx.lineWidth = 2;
      ctx.strokeText(sym, 32, 34);
      ctx.fillStyle = '#111';
    }
    ctx.fillText(sym, 32, 34);
    out[code] = c.toDataURL();
  }
  return out;
}());

// ── Normal drag-drop handlers ─────────────────────────────────────────────────

function normalOnDrop(source, target, piece) {
  dragging = false;
  if (source === target) return 'snapback';
  if ((piece === 'wP' && target[1] === '8') ||
      (piece === 'bP' && target[1] === '1')) {
    showPromoModal(source, target, piece[0]);
    return;
  }
  send({type: 'move', from: source, to: target, promotion: ''});
}

// ── Problem mode drag-drop handlers ──────────────────────────────────────────

function problemOnDrop(source, target, piece) {
  dragging = false;
  if (source === target) return 'snapback';
  // Drop off board: delete the piece
  if (target === 'offboard') return 'trash';
  // Spare piece onto board: chessboard.js places it; spare stays (sparePieces behaviour)
  if (source === 'spare') return;
  // Board-to-board in copy mode: schedule source restoration after snap
  if (copyMode) copyPending = {sq: source, piece: piece};
}

function problemSnapEnd() {
  dragging = false;
  if (copyPending) {
    var pos = board.position();
    pos[copyPending.sq] = copyPending.piece;
    board.position(pos, false);
    copyPending = null;
  }
}

// ── Board factory ─────────────────────────────────────────────────────────────

var board;

function makeBoard(pos, withSpare) {
  if (board) board.destroy();
  var cfg = {
    position: pos || 'start',
    draggable: true,
    pieceTheme: function(p) { return PIECE_IMGS[p]; },
    onDragStart: function() { dragging = true; },
    onSnapEnd: withSpare ? problemSnapEnd : function() { dragging = false; },
    onDrop:    withSpare ? problemOnDrop  : normalOnDrop
  };
  if (withSpare) cfg.sparePieces = true;
  board = Chessboard('board', cfg);
}

makeBoard('start', false);

// ── Problem mode enter / exit ─────────────────────────────────────────────────

function enterProblemMode(state) {
  problemMode = true;
  // Pre-fill turn
  var turnVal = (state.turn === 'Noirs') ? 'b' : 'w';
  document.querySelector('input[name="prob-turn"][value="' + turnVal + '"]').checked = true;
  // Pre-fill castle rights
  document.getElementById('castle-wk').checked = !!state.castleWK;
  document.getElementById('castle-wq').checked = !!state.castleWQ;
  document.getElementById('castle-bk').checked = !!state.castleBK;
  document.getElementById('castle-bq').checked = !!state.castleBQ;
  // Show panel (flex makes it appear as a column to the left of the board)
  document.getElementById('problem-panel').style.display = 'flex';
  document.getElementById('problem-check').checked = true;
  // Recreate board with spare pieces using current server position
  makeBoard(state.fen, true);
}

function leaveProblemModeUI() {
  problemMode = false;
  copyMode = false;
  copyPending = null;
  var btn = document.getElementById('copy-mode-btn');
  btn.textContent = 'Copie : OFF';
  btn.classList.remove('active');
  document.getElementById('problem-panel').style.display = 'none';
  document.getElementById('problem-check').checked = false;
  makeBoard(lastFen, false);
}

function onProblemCheck() {
  var checked = document.getElementById('problem-check').checked;
  if (checked) {
    // Tell server to enter problem mode; it will reply with problemMode=true
    send({type: 'problem_enter'});
  } else {
    // Collect current board state and send to server
    var pos  = board.position();
    var fen  = boardToFen(pos);
    var turn = document.querySelector('input[name="prob-turn"]:checked').value;
    send({
      type:         'problem_exit',
      fen:          fen,
      turn:         turn,
      castleWhiteK: document.getElementById('castle-wk').checked,
      castleWhiteQ: document.getElementById('castle-wq').checked,
      castleBlackK: document.getElementById('castle-bk').checked,
      castleBlackQ: document.getElementById('castle-bq').checked
    });
    leaveProblemModeUI();
  }
}

function toggleCopyMode() {
  copyMode = !copyMode;
  copyPending = null;
  var btn = document.getElementById('copy-mode-btn');
  btn.textContent = copyMode ? 'Copie : ON' : 'Copie : OFF';
  btn.classList.toggle('active', copyMode);
}

// ── FEN helper ────────────────────────────────────────────────────────────────

function boardToFen(pos) {
  var ranks = [];
  for (var r = 8; r >= 1; r--) {
    var s = '';
    var empty = 0;
    for (var f = 0; f < 8; f++) {
      var sq = String.fromCharCode(97 + f) + r;
      var p = pos[sq];
      if (!p) {
        empty++;
      } else {
        if (empty > 0) { s += empty; empty = 0; }
        var ch = p[1]; // piece letter: K/Q/R/B/N/P
        s += (p[0] === 'w') ? ch.toUpperCase() : ch.toLowerCase();
      }
    }
    if (empty > 0) s += empty;
    ranks.push(s);
  }
  return ranks.join('/');
}

// ── Promotion modal ───────────────────────────────────────────────────────────

function showPromoModal(source, target, color) {
  pendingPromo = {source: source, target: target};
  document.getElementById('pi-q').src = PIECE_IMGS[color + 'Q'];
  document.getElementById('pi-r').src = PIECE_IMGS[color + 'R'];
  document.getElementById('pi-b').src = PIECE_IMGS[color + 'B'];
  document.getElementById('pi-n').src = PIECE_IMGS[color + 'N'];
  document.getElementById('promo-modal').style.display = 'flex';
}

function choosePromo(p) {
  if (!pendingPromo) return;
  var mv = {type: 'move', from: pendingPromo.source, to: pendingPromo.target, promotion: p};
  pendingPromo = null;
  document.getElementById('promo-modal').style.display = 'none';
  send(mv);
}

function cancelPromo() {
  pendingPromo = null;
  document.getElementById('promo-modal').style.display = 'none';
  board.position(lastFen);
}

// ── State update ──────────────────────────────────────────────────────────────

function updateState(state) {
  lastFen = state.fen;

  // Handle problem mode transitions driven by server state
  if (state.problemMode && !problemMode) {
    enterProblemMode(state);
  } else if (!state.problemMode && problemMode) {
    leaveProblemModeUI();
  }

  // Update board position only in normal mode (problem mode manages its own board)
  if (!problemMode && !dragging && pendingPromo === null) {
    board.position(state.fen);
  }

  // Version footer
  document.getElementById('version-info').textContent =
    '© 2025-2026 Xavier Gandillot  –  v' + state.version;

  // Clocks (frozen in problem mode)
  document.getElementById('white-time').textContent = fmtTime(state.whiteTime);
  document.getElementById('black-time').textContent = fmtTime(state.blackTime);
  document.getElementById('clock-white').classList.toggle('active',
    !state.gameOver && !state.problemMode && state.turn === 'Blancs');
  document.getElementById('clock-black').classList.toggle('active',
    !state.gameOver && !state.problemMode && state.turn === 'Noirs');

  // Turn info
  var ti = document.getElementById('turn-info');
  if (state.problemMode) {
    ti.textContent = '── MODE PROBLÈME ──';
    ti.className = 'gameover';
  } else if (state.gameOver) {
    ti.textContent = '── PARTIE TERMINÉE ──';
    ti.className = 'gameover';
  } else {
    ti.textContent = 'Trait aux ' + state.turn +
      '  (score : ' + fmtScore(state.score) + ')';
    ti.className = '';
  }

  // Message
  var msgEl = document.getElementById('message');
  msgEl.textContent = state.message;
  msgEl.className = state.message && (
    state.message.indexOf('MAT')      !== -1 ||
    state.message.indexOf('illégal')  !== -1 ||
    state.message.indexOf('invalide') !== -1 ||
    state.message.indexOf('autoplay') !== -1
  ) ? 'err' : '';

  // History
  document.getElementById('history').textContent = state.history || '–';

  // Analysis stats
  document.getElementById('stats').innerHTML =
    'Profondeur : <b>' + state.depth + '</b>' +
    '&nbsp;&nbsp;|&nbsp;&nbsp;Score : <b>' + fmtScore(state.score) + '</b>' +
    '&nbsp;&nbsp;|&nbsp;&nbsp;Meilleur : <b>' + state.best + '</b>' +
    '<pre>' + escHtml(state.tableStats) + '</pre>';

  // Buttons
  document.getElementById('auto-btn').disabled  = state.gameOver || state.problemMode;
  document.getElementById('reset-btn').disabled = state.problemMode;
}

// ── WebSocket ─────────────────────────────────────────────────────────────────

function connect() {
  var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + '/ws');

  ws.onopen = function () {
    var el = document.getElementById('ws-status');
    el.textContent = '● connecté';
    el.className = 'ok';
  };

  ws.onmessage = function (e) {
    try {
      var state = JSON.parse(e.data);
      if (state.type === 'state') updateState(state);
    } catch (_) {}
  };

  ws.onclose = function () {
    if (quitting) { window.close(); return; }
    var el = document.getElementById('ws-status');
    el.textContent = '● déconnecté';
    el.className = '';
    document.getElementById('auto-btn').disabled = true;
    setTimeout(connect, 2000);
  };
}

function send(msg) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(msg));
  }
}

function sendAuto()  { send({type: 'auto'}); }

function sendReset() {
  if (!confirm('Commencer une nouvelle partie ?')) return;
  send({type: 'reset'});
}

function sendQuit() {
  if (!confirm('Éteindre le serveur ?')) return;
  quitting = true;
  send({type: 'quit'});
}

// ── Utilities ─────────────────────────────────────────────────────────────────

function fmtTime(sec) {
  var s = Math.floor(sec);
  var h = Math.floor(s / 3600);
  var m = Math.floor((s % 3600) / 60);
  var r = s % 60;
  if (h > 0) return h + ':' + pad(m) + ':' + pad(r);
  return m + ':' + pad(r);
}

function pad(n) { return String(n).padStart(2, '0'); }
function fmtScore(n) { return (n >= 0 ? '+' : '') + n; }
function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

// ── Start ─────────────────────────────────────────────────────────────────────

connect();
</script>
</body>
</html>
