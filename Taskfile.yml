version: '3'


env:
  GOOS: # windows or linux ?
    sh: go env GOOS
  VERSION: # program version
    sh: go run ./version
  EXE: # executable extension (.exe or nothing)
    sh: 'if [ "$(go env GOOS)" = "windows" ]; then echo ".exe"; else echo ""; fi'
  BROWSER: # browser to open  page
    sh: 'if [ "$(go env GOOS)" = "windows" ]; then echo "Powershell Start-Process "; else echo "xdg-open"; fi'
  DATE: # date string
    sh: 'if [ "$(go env GOOS)" = "windows" ]; then echo "$(Powershell Get-Date -Format s)"; else echo "$(date -Iseconds)"; fi'
  BENCH_DATE: # filename-safe timestamp for benchmark output files
    sh: 'if [ "$(go env GOOS)" = "windows" ]; then echo "$(Powershell Get-Date -Format ''yyyy-MM-dd_HH-mm-ss'')"; else echo "$(date ''+%Y-%m-%d_%H-%M-%S'')"; fi'
  


tasks:

  default:
    desc: default task will display task menu (and update task itself)
    cmds:
      - go install github.com/go-task/task/v3/cmd/task@latest
      - echo "default task will display task menu"
      - task --list-all


  godoc: 
    desc: launch godoc viewer and open browser page on windows
    cmds:     
      - go install golang.org/x/tools/cmd/godoc@latest
      - $( {{.BROWSER }} "http://localhost:6060" )
      - godoc -http=:6060   

  build:
    desc: build both text client and http/server interfaces
    deps: [client, server, gencache]

  client:
    desc: build executables for terminal clients (windows or linux)
    cmds:
      - echo Saving built executable in ./bin/mychess-{{.VERSION}}{{.EXE}}
      - go build -o ./bin/mychess-{{.VERSION}}{{.EXE}} -ldflags "-X 'github.com/xavier268/mychess.BUILDDATE={{.DATE}}' -X 'github.com/xavier268/mychess.BUILDHASH=$(git rev-parse HEAD)'" ./client/...
      - go build -o ./bin/mychess-{{.VERSION}}low{{.EXE}} -tags low -ldflags "-X 'github.com/xavier268/mychess.BUILDDATE={{.DATE}}' -X 'github.com/xavier268/mychess.BUILDHASH=$(git rev-parse HEAD)'" ./client/...
      - go build -o ./bin/mychess-{{.VERSION}}high{{.EXE}} -tags high -ldflags "-X 'github.com/xavier268/mychess.BUILDDATE={{.DATE}}' -X 'github.com/xavier268/mychess.BUILDHASH=$(git rev-parse HEAD)'" ./client/...
      - go build -o ./bin/mychess-{{.VERSION}}ultra{{.EXE}} -tags ultra -ldflags "-X 'github.com/xavier268/mychess.BUILDDATE={{.DATE}}' -X 'github.com/xavier268/mychess.BUILDHASH=$(git rev-parse HEAD)'" ./client/...

  server:
    desc: build the HTTP server (all memory configurations)
    cmds:
      - echo Saving built executable in ./bin/mychess-server-{{.VERSION}}{{.EXE}}
      - go build -o ./bin/mychess-server-{{.VERSION}}{{.EXE}} -ldflags "-X 'github.com/xavier268/mychess.BUILDDATE={{.DATE}}' -X 'github.com/xavier268/mychess.BUILDHASH=$(git rev-parse HEAD)'" ./server/...
      - go build -o ./bin/mychess-server-{{.VERSION}}low{{.EXE}} -tags low -ldflags "-X 'github.com/xavier268/mychess.BUILDDATE={{.DATE}}' -X 'github.com/xavier268/mychess.BUILDHASH=$(git rev-parse HEAD)'" ./server/...
      - go build -o ./bin/mychess-server-{{.VERSION}}high{{.EXE}} -tags high -ldflags "-X 'github.com/xavier268/mychess.BUILDDATE={{.DATE}}' -X 'github.com/xavier268/mychess.BUILDHASH=$(git rev-parse HEAD)'" ./server/...
      - go build -o ./bin/mychess-server-{{.VERSION}}ultra{{.EXE}} -tags ultra -ldflags "-X 'github.com/xavier268/mychess.BUILDDATE={{.DATE}}' -X 'github.com/xavier268/mychess.BUILDHASH=$(git rev-parse HEAD)'" ./server/...

  gencache:
    desc: build gencache tool (all memory configurations)
    cmds:
      - go build -o ./bin/gencache{{.EXE}} ./gencache/...
      - go build -o ./bin/gencache-low{{.EXE}} -tags low ./gencache/...
      - go build -o ./bin/gencache-high{{.EXE}} -tags high ./gencache/...
      - go build -o ./bin/gencache-ultra{{.EXE}} -tags ultra ./gencache/...

  cache:
    desc: generate cache file  - this will TAKE TIME ...
    cmds:
      - go run -tags low ./gencache/...  -fill 75 -dir ./bin/
      - go run  ./gencache/...  -fill 75 -dir ./bin/
      - go run -tags high ./gencache/...  -fill 75 -dir ./bin/
      - go run -tags ultra ./gencache/...  -fill 75 -dir ./bin/

  version:
    desc: display versionning information
    cmds:
      - task --version
      - echo myCDesk version':' {{.VERSION}}
      - echo "shell :" $0 $SHELL
      - go version

  test:
    desc: run all tests then benchmarks (results saved to bench-<timestamp>.txt)
    cmds:
      - go test -v -count=1 ./...
      - go test -bench=. -benchmem -run=^$ ./... > bench-{{.VERSION}}-{{.BENCH_DATE}}.txt
      - cat bench-{{.VERSION}}-{{.BENCH_DATE}}.txt
